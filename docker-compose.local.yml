# ================================================
# SwiftLead Backend - Local Deployment
# ================================================
# Jalankan dengan: docker compose -f docker-compose.local.yml up -d
#
# Pastikan file .env sudah ada (copy dari .env.example)
# ================================================

services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/mfuadfakhruzzaki/swiftlead-backend:latest}
    container_name: swiftlead-backend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      mosquitto:
        condition: service_started
    networks:
      - swiftlead-network

  db:
    image: timescale/timescaledb:latest-pg16
    platform: linux/amd64
    container_name: swiftlead-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-swiftlet}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-swiftlet123}
      POSTGRES_DB: ${DB_NAME:-swiftlet}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-swiftlet}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swiftlead-network

  minio:
    image: minio/minio:latest
    container_name: swiftlead-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - swiftlead-network

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: swiftlead-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_TLS_PORT:-8883}:8883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
    networks:
      - swiftlead-network

  prometheus:
    image: prom/prometheus:latest
    container_name: swiftlead-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - swiftlead-network

  grafana:
    image: grafana/grafana:latest
    container_name: swiftlead-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3030}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-swiftlead_admin}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - swiftlead-network

volumes:
  postgres_data:
  minio_data:
  mosquitto_data:
  prometheus_data:
  grafana_data:

networks:
  swiftlead-network:
    driver: bridge

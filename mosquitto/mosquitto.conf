# ===================================
# Mosquitto MQTT Broker Configuration
# ===================================

# Plain TCP listener (for internal container-to-container communication)
listener 1883
allow_anonymous true

# TLS listener (for external / production connections)
# Uncomment the lines below and provide certificates to enable TLS.
#
# listener 8883
# cafile /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key
# require_certificate false
# tls_version tlsv1.2

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type all
